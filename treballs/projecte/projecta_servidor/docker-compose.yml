version: '3.8'

services:
  api:
    build: .
    volumes:
      - ./storage:/var/www/html/storage  # Solo storage persiste
    environment:
      - APP_ENV=production
    depends_on:
      - mysql
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    restart: always

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: fantasydb
      MYSQL_USER: fantasy_user
      MYSQL_PASSWORD: tu_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data: