version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_fantasy
    networks:
      - fantasy_network
    ports:
      - "${MYSQL_EXT_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    restart: always

  api:
    image: ikercarretero/fantasy-api
    container_name: api_fantasy
    networks:
      - fantasy_network
    ports:
      - "${API_EXT_PORT}:80"
    depends_on:
      - mysql
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_KEY: ${APP_KEY}
    restart: always

volumes:
  mysql_data:

networks:
  fantasy_network:

